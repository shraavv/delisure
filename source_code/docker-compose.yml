services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: delisure
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delisure"]
      interval: 3s
      timeout: 3s
      retries: 10

  ml_service:
    build: ./ml_service
    environment:
      DATABASE_URL: postgresql://postgres@db:5432/delisure
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres@db:5432/delisure
      ML_SERVICE_URL: http://ml_service:8000
      API_KEY: delisure-demo-key-2026
      OPENWEATHER_API_KEY: REPLACE_WITH_YOUR_OPENWEATHER_API_KEY
      RAZORPAY_KEY_ID: rzp_test_delisure2026
      RAZORPAY_KEY_SECRET: rzp_secret_delisure_demo_9f3a4c2b
      RAZORPAY_WEBHOOK_SECRET: whsec_delisure_demo_2026
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      ml_service:
        condition: service_started

volumes:
  pgdata:
